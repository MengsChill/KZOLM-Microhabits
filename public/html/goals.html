<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroHabits - Goals</title>
    <style>
        :root {
            --primary-color: #0e6b4b;
            --primary-light: #4caf50;
            --primary-dark: #0a4f36;
            --background-color: #f5f7fa;
            --card-color: #ffffff;
            --text-color: #333333;
            --text-light: #666666;
            --border-color: #e0e0e0;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--text-color);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Navigation */
        .nav-container {
            background: var(--primary-color);
            padding: 15px 0;
            box-shadow: var(--shadow);
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
            transition: var(--transition);
        }

        .nav-links a:hover, .nav-links a.active {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Page Header */
        .page-header {
            text-align: center;
            margin: 40px 0;
            animation: fadeInUp 1s ease-out;
        }

        .page-header h1 {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-header p {
            font-size: 1.2rem;
            color: var(--text-light);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Goals Container */
        .goals-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin: 40px 0;
        }

        .goal-form {
            background: var(--card-color);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
        }

        .goal-form h2 {
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-color);
            font-weight: 600;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(14, 107, 75, 0.1);
        }

        .goals-list {
            background: var(--card-color);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
        }

        .goal-item {
            background: rgba(14, 107, 75, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary-color);
            transition: var(--transition);
            animation: slideInRight 0.5s ease-out;
        }

        .goal-item:hover {
            transform: translateX(5px);
            background: rgba(14, 107, 75, 0.1);
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .goal-title {
            font-weight: 600;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .goal-category {
            background: var(--primary-color);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .goal-progress {
            margin-top: 10px;
        }

        .progress-bar {
            height: 8px;
            background: var(--border-color);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(14, 107, 75, 0.3);
        }

        .delete-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                gap: 15px;
            }

            .nav-links a {
                padding: 6px 12px;
                font-size: 0.9rem;
            }

            .page-header h1 {
                font-size: 2rem;
            }

            .goals-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <div class="nav-container">
        <div class="nav-content">
            <a href="dashboard.html" class="logo">MicroHabits</a>
            <div class="nav-links">
                <a href="meditation.html">Meditation</a>
                <a href="goals.html" class="active">Goals</a>
                <a href="rewards.html">Rewards</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>Your Goals</h1>
            <p>Set meaningful goals and track your progress towards better habits</p>
        </div>

        <div class="goals-container">
            <div class="goal-form">
                <h2>Create New Goal</h2>
                <form id="goal-form">
                    <div class="form-group">
                        <label for="goal-title">Goal Title</label>
                        <input type="text" id="goal-title" placeholder="e.g., Meditate daily" required>
                    </div>
                    <div class="form-group">
                        <label for="goal-category">Category</label>
                        <select id="goal-category">
                            <option value="health">Health & Wellness</option>
                            <option value="productivity">Productivity</option>
                            <option value="learning">Learning</option>
                            <option value="relationships">Relationships</option>
                            <option value="financial">Financial</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="goal-duration">Duration (days)</label>
                        <input type="number" id="goal-duration" min="1" max="365" value="30">
                    </div>
                    <div class="form-group">
                        <label for="goal-description">Description</label>
                        <textarea id="goal-description" rows="3" placeholder="Describe your goal..."></textarea>
                    </div>
                    <button type="submit" class="btn">Create Goal</button>
                </form>
            </div>

            <div class="goals-list">
                <h2>Your Goals</h2>
                <div id="goals-container">
                    <!-- Goals will be dynamically added here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let goals = JSON.parse(localStorage.getItem('goals')) || [];

        document.getElementById('goal-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const title = document.getElementById('goal-title').value;
            const category = document.getElementById('goal-category').value;
            const duration = parseInt(document.getElementById('goal-duration').value);
            const description = document.getElementById('goal-description').value;

            const newGoal = {
                id: Date.now(),
                title,
                category,
                duration,
                description,
                progress: 0,
                createdAt: new Date().toISOString()
            };

            goals.push(newGoal);
            localStorage.setItem('goals', JSON.stringify(goals));
            renderGoals();
            
            // Reset form
            document.getElementById('goal-form').reset();
            document.getElementById('goal-duration').value = 30;
            
            // Show success animation
            const btn = document.querySelector('.goal-form .btn');
            btn.textContent = '✓ Goal Created!';
            setTimeout(() => {
                btn.textContent = 'Create Goal';
            }, 2000);
        });

        function renderGoals() {
            const container = document.getElementById('goals-container');
            container.innerHTML = '';

            if (goals.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-light);">No goals yet. Create your first goal!</p>';
                return;
            }

            goals.forEach(goal => {
                const goalElement = document.createElement('div');
                goalElement.className = 'goal-item';
                goalElement.innerHTML = `
                    <div class="goal-header">
                        <div class="goal-title">${goal.title}</div>
                        <div class="goal-category">${goal.category}</div>
                    </div>
                    <p>${goal.description}</p>
                    <div class="goal-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${goal.progress}%"></div>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-top: 5px; font-size: 0.9rem;">
                            <span>${goal.progress}% Complete</span>
                            <span>${goal.duration} days</span>
                        </div>
                    </div>
                    <button class="delete-btn" onclick="deleteGoal(${goal.id})">Delete</button>
                `;
                container.appendChild(goalElement);
            });
        }

        function deleteGoal(id) {
            goals = goals.filter(goal => goal.id !== id);
            localStorage.setItem('goals', JSON.stringify(goals));
            renderGoals();
        }

        // Initialize
        renderGoals();
    </script>
</body>
</html>
