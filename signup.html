<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kzoim – Sign Up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">Kzoim</div>
  </header>

  <main class="signup-container">
    <section class="signup-box">
      <h2>Sign Up</h2>

      <label>Your email</label>
      <input type="email" placeholder="Enter your email" />

      <label>Password</label>
      <div class="password-field">
        <input type="password" placeholder="Enter your password" />
        <span class="toggle">👁️</span>
      </div>

      <label>Confirm password</label>
      <div class="password-field">
        <input type="password" placeholder="Enter your password" />
        <span class="toggle">👁️</span>
      </div>

      <button class="btn login">Sign Up</button>
    </section>

    <section class="signup-image">
      <img src="https://images.unsplash.com/photo-1605296867304-46d5465a13f1?auto=format&fit=crop&w=1000&q=80" alt="Fitness Motivation">
    </section>
  </main>

  <footer class="tagline">
    Welcome to your journey, Welcome to microhabits.
  </footer>
  <script>
  // Select all toggle icons
  document.querySelectorAll('.toggle').forEach(toggle => {
    toggle.addEventListener('click', () => {
      const input = toggle.previousElementSibling; // the input next to the eye icon
      if (input.type === 'password') {
        input.type = 'text';
        toggle.textContent = '🙈'; // change icon when visible
      } else {
        input.type = 'password';
        toggle.textContent = '👁️'; // revert icon
      }
    });
  });
</script>

</body>
</html>
