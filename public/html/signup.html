<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kzolm – Sign Up</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">Kzolm</div>
  </header>

  <main class="signup-container">
    <section class="signup-box">
      <h2>Sign Up</h2>

      <form action="/signup" method="POST">
        <label>Your email</label>
        <input type="email" name="email" placeholder="Enter your email" required />

        <label>Password</label>
        <div class="password-field">
          <input type="password" name="password" placeholder="Enter your password" required />
          <span class="toggle">👁️</span>
        </div>

        <label>Confirm password</label>
        <div class="password-field">
          <input type="password" name="confirm" placeholder="Re-enter your password" required />
          <span class="toggle">👁️</span>
        </div>

        <button type="submit" class="btn login">Sign Up</button>
      </form>
    </section>

    <section class="signup-image">
      <img src="https://images.unsplash.com/photo-1605296867304-46d5465a13f1?auto=format&fit=crop&w=1000&q=80" alt="Fitness Motivation">
    </section>
  </main>

  <footer class="tagline">
    Welcome to your journey, Welcome to microhabits.
  </footer>

  <script>
    document.querySelectorAll('.toggle').forEach(toggle => {
      toggle.addEventListener('click', () => {
        const input = toggle.previousElementSibling;
        if (input.type === 'password') {
          input.type = 'text';
          toggle.textContent = '🙈';
        } else {
          input.type = 'password';
          toggle.textContent = '👁️';
        }
      });
    });
  </script>
</body>
</html>
