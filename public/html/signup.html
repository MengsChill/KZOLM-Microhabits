<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kzolm – Sign Up</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">Kzolm</div>
  </header>

  <main class="signup-container">
    <section class="signup-box">
      <h2>Sign Up</h2>

      <form id="signup-form" action="/signup" method="POST">
        <label>Your email</label>
        <input type="email" name="email" id="email" placeholder="Enter your email" required />

        <label>Password</label>
        <div class="password-field">
          <input type="password" name="password" id="password" placeholder="Enter your password" required />
          <span class="toggle">
            <!-- Default Eye icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"></path>
            </svg>
          </span>
        </div>

        <ul class="password-requirements">
          <li id="req-uppercase">❌ At least 1 uppercase letter</li>
          <li id="req-number">❌ At least 1 number</li>
          <li id="req-special">❌ At least 1 special character</li>
          <li id="req-common">❌ Cannot be a common password</li>
        </ul>

        <label>Confirm password</label>
        <div class="password-field">
          <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Re-enter your password" required />
          <span class="toggle">
            <!-- Default Eye icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"></path>
            </svg>
          </span>
        </div>

        <div id="error-msg" class="error-msg" style="color:red; display:none;"></div>

        <button type="submit" class="btn signup">Sign Up</button>
        <p>Already have an account? <a href="/signin">Sign in here</a></p>
      </form>
    </section>

    <!-- Added image section -->
    <section class="signup-image">
      <img src="https://images.unsplash.com/photo-1547592180-85f173990554?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=600&q=80" alt="Person drinking water and reading">
    </section>
  </main>

  <script>
    const passwordField = document.getElementById('password');
    const confirmField = document.getElementById('confirmPassword');
    const toggles = document.querySelectorAll('.toggle');
    const form = document.getElementById('signup-form');
    const errorMsg = document.getElementById('error-msg');

    const requirements = {
      uppercase: document.getElementById('req-uppercase'),
      number: document.getElementById('req-number'),
      special: document.getElementById('req-special'),
      common: document.getElementById('req-common')
    };

    const commonPasswords = ['123456', 'password', 'Password123', '123456789', 'qwerty'];

    // Eye toggle (SVG icons)
    toggles.forEach(toggle => {
      toggle.addEventListener('click', () => {
        const input = toggle.previousElementSibling;

        if (input.type === 'password') {
          input.type = 'text';
          toggle.innerHTML = `
            <!-- Eye-off icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94L6.06 6.06M1 1l22 22"></path>
              <path d="M10.59 10.59a3 3 0 0 1 4.24 4.24"></path>
              <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"></path>
            </svg>`;
        } else {
          input.type = 'password';
          toggle.innerHTML = `
            <!-- Eye icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"></path>
            </svg>`;
        }
      });
    });

    // Password validation
    function validatePassword() {
      const pwd = passwordField.value;

      if (/[A-Z]/.test(pwd)) {
        requirements.uppercase.textContent = '✅ At least 1 uppercase letter';
        requirements.uppercase.style.color = 'green';
      } else {
        requirements.uppercase.textContent = '❌ At least 1 uppercase letter';
        requirements.uppercase.style.color = 'red';
      }

      if (/\d/.test(pwd)) {
        requirements.number.textContent = '✅ At least 1 number';
        requirements.number.style.color = 'green';
      } else {
        requirements.number.textContent = '❌ At least 1 number';
        requirements.number.style.color = 'red';
      }

      if (/[!@#$%^&*(),.?":{}|<>]/.test(pwd)) {
        requirements.special.textContent = '✅ At least 1 special character';
        requirements.special.style.color = 'green';
      } else {
        requirements.special.textContent = '❌ At least 1 special character';
        requirements.special.style.color = 'red';
      }

      if (!commonPasswords.includes(pwd)) {
        requirements.common.textContent = '✅ Cannot be a common password';
        requirements.common.style.color = 'green';
      } else {
        requirements.common.textContent = '❌ Cannot be a common password';
        requirements.common.style.color = 'red';
      }
    }

    passwordField.addEventListener('input', validatePassword);

    // Form submission validation
    form.addEventListener('submit', function(e) {
      const allValid = Object.values(requirements).every(req => req.textContent.startsWith('✅'));
      if (!allValid) {
        e.preventDefault();
        errorMsg.textContent = 'Password does not meet all requirements.';
        errorMsg.style.display = 'block';
        return;
      }

      if (passwordField.value !== confirmField.value) {
        e.preventDefault();
        errorMsg.textContent = 'Passwords do not match.';
        errorMsg.style.display = 'block';
        return;
      }

      errorMsg.style.display = 'none';
    });
  </script>
</body>
</html>
