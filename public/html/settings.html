<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Microhabits</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0e6b4b;
            --primary-light: #4caf50;
            --primary-dark: #0a4f36;
            --background-color: #f5f7fa;
            --card-color: #ffffff;
            --text-color: #333333;
            --text-light: #666666;
            --border-color: #e0e0e0;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .settings-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--card-color);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* Header */
        .settings-header {
            padding: 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #f0f0f0;
            color: var(--text-color);
            text-decoration: none;
            transition: var(--transition);
        }

        .back-button:hover {
            background-color: var(--primary-color);
            color: white;
        }

        .settings-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--primary-dark);
        }

        /* Settings Content */
        .settings-content {
            padding: 25px;
        }

        .setting-item {
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .setting-title {
            font-size: 18px;
            font-weight: 500;
        }

        .setting-description {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 15px;
        }

        /* Toggle Switch */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: var(--transition);
            border-radius: 34px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: var(--transition);
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: var(--primary-color);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(26px);
        }

        /* Select Dropdown */
        .select-container {
            position: relative;
            width: 100%;
        }

        .select-container select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            background-color: white;
            appearance: none;
            cursor: pointer;
        }

        .select-container:after {
            content: "\f078";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: var(--text-light);
        }

        select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(14, 107, 75, 0.1);
        }

        /* Save Button */
        .save-button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .save-button:hover {
            background-color: var(--primary-dark);
        }

        /* Alert */
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .alert-success {
            background-color: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #2e7d32;
        }

        /* Profile Section */
        .profile-section {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .profile-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
        }

        .profile-info h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .profile-info p {
            color: var(--text-light);
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 576px) {
            .settings-container {
                border-radius: 12px;
            }
            
            .settings-header, .settings-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <!-- Header -->
        <div class="settings-header">
            <a href="/main" class="back-button">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="settings-title">Settings</h1>
        </div>

        <!-- Settings Content -->
        <div class="settings-content">
            <!-- Profile Section -->
            <div class="profile-section">
                <div class="profile-avatar">JD</div>
                <div class="profile-info">
                    <h2>John Doe</h2>
                    <p>john.doe@example.com</p>
                </div>
            </div>

            <!-- Success Alert -->
            <div class="alert alert-success" id="successAlert">
                <i class="fas fa-check-circle"></i>
                <span>Settings saved successfully!</span>
            </div>

            <!-- Setting 1: Notifications -->
            <div class="setting-item">
                <div class="setting-header">
                    <h3 class="setting-title">Notifications</h3>
                    <label class="toggle-switch">
                        <input type="checkbox" id="notificationsToggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <p class="setting-description">Receive reminders and updates about your habits</p>
            </div>

            <!-- Setting 2: Theme -->
            <div class="setting-item">
                <div class="setting-header">
                    <h3 class="setting-title">Theme</h3>
                </div>
                <p class="setting-description">Choose your preferred appearance</p>
                <div class="select-container">
                    <select id="themeSelect">
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                        <option value="auto">Auto (System)</option>
                    </select>
                </div>
            </div>

            <!-- Setting 3: Data & Privacy -->
            <div class="setting-item">
                <div class="setting-header">
                    <h3 class="setting-title">Data & Privacy</h3>
                </div>
                <p class="setting-description">Control how your data is used</p>
                <div class="select-container">
                    <select id="privacySelect">
                        <option value="standard">Standard (Recommended)</option>
                        <option value="minimal">Minimal Data Collection</option>
                        <option value="enhanced">Enhanced Analytics</option>
                    </select>
                </div>
            </div>

            <!-- Save Button -->
            <button class="save-button" id="saveButton">
                <i class="fas fa-save"></i>
                Save Changes
            </button>
        </div>
    </div>

    <script>
        // DOM Elements
        const notificationsToggle = document.getElementById('notificationsToggle');
        const themeSelect = document.getElementById('themeSelect');
        const privacySelect = document.getElementById('privacySelect');
        const saveButton = document.getElementById('saveButton');
        const successAlert = document.getElementById('successAlert');

        // Load saved settings
        function loadSettings() {
            const savedSettings = JSON.parse(localStorage.getItem('userSettings')) || {};
            
            if (savedSettings.notifications !== undefined) {
                notificationsToggle.checked = savedSettings.notifications;
            }
            
            if (savedSettings.theme) {
                themeSelect.value = savedSettings.theme;
            }
            
            if (savedSettings.privacy) {
                privacySelect.value = savedSettings.privacy;
            }
        }

        // Save settings
        function saveSettings() {
            const settings = {
                notifications: notificationsToggle.checked,
                theme: themeSelect.value,
                privacy: privacySelect.value,
                lastUpdated: new Date().toISOString()
            };
            
            localStorage.setItem('userSettings', JSON.stringify(settings));
            
            // Show success message
            successAlert.style.display = 'flex';
            
            // Hide success message after 3 seconds
            setTimeout(() => {
                successAlert.style.display = 'none';
            }, 3000);
        }

        // Event Listeners
        saveButton.addEventListener('click', saveSettings);

        // Initialize
        document.addEventListener('DOMContentLoaded', loadSettings);
    </script>
</body>
</html>
