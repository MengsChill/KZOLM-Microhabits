<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kzolm - Sign In</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">Kzolm</div>
  </header>

  <main class="signin-container">
    <section class="signin-box">
      <h2>Sign In</h2>

      <form action="/signin" method="POST">
        <label>Your email</label>
        <input type="email" name="email" placeholder="Enter your email" required />

        <label>Password</label>
        <div class="password-field">
          <input type="password" name="password" placeholder="Enter your password" required />
          <span class="toggle">
            <!-- Eye icon SVG (default hidden) -->
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"></path>
            </svg>
          </span>
        </div>

        <a href="#" class="forgot">Forgot your password?</a>

        <button type="submit" class="btn login">Sign In</button>
      </form>

      <p class="or">or login with</p>
      <div class="socials">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/google.svg" alt="Google">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg" alt="Facebook">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/apple.svg" alt="Apple">
      </div>
    </section>

    <section class="signin-image">
      <img src="https://media.istockphoto.com/id/2027278927/photo/young-athletic-woman-exercising-with-barbell-during-sports-training-in-a-gym.jpg?s=612x612&w=0&k=20&c=ifFL7Mqc8NwTj25PAx4ONy1OOQZvc1S_kVOofsbLgFw=" alt="Fitness">
    </section>
  </main>

  <footer class="tagline">
    You Don’t Need A New Life, Just New Habits.
  </footer>

  <script>
    // Eye toggle
    document.querySelectorAll('.toggle').forEach(toggle => {
      toggle.addEventListener('click', () => {
        const input = toggle.previousElementSibling;

        if (input.type === 'password') {
          input.type = 'text';
          toggle.innerHTML = `
            <!-- Eye-off icon SVG -->
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94L6.06 6.06M1 1l22 22"></path>
              <path d="M10.59 10.59a3 3 0 0 1 4.24 4.24"></path>
              <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"></path>
            </svg>`;
        } else {
          input.type = 'password';
          toggle.innerHTML = `
            <!-- Eye icon SVG -->
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"></path>
            </svg>`;
        }
      });
    });

    // Incorrect password handling
    const form = document.querySelector('form');
    const passwordInput = form.querySelector('input[name="password"]');
    const forgotLink = form.querySelector('.forgot');

    // Create error message element
    const errorMsg = document.createElement('div');
    errorMsg.style.color = 'red';
    errorMsg.style.marginBottom = '5px';
    errorMsg.style.display = 'none';
    errorMsg.textContent = 'Incorrect password';

    // Insert above the "Forgot your password?" link
    forgotLink.parentNode.insertBefore(errorMsg, forgotLink);

      const enteredPassword = passwordInput.value;
      const correctPassword = "123456"; // replace with your correct password

      if (enteredPassword === correctPassword) {
        errorMsg.style.display = 'none';
        // Navigate to next page
        window.location.href = '/nextpage.html'; // replace with your page
      } else {
        errorMsg.style.display = 'block';
        passwordInput.value = '';
      }
  </script>
</body>
</html>
