<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kzoim – Sign In</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">Kzoim</div>
  </header>

  <main class="signin-container">
    <section class="signin-box">
      <h2>Sign In</h2>

      <label>Your email</label>
      <input type="email" placeholder="Enter your email" />

      <label>Password</label>
      <div class="password-field">
        <input type="password" placeholder="Enter your password" />
        <span class="toggle">👁️</span>
      </div>

      <a href="#" class="forgot">Forgot your password?</a>

      <button class="btn login">Log In</button>

      <p class="or">or login with</p>
      <div class="socials">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/google.svg" alt="Google">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg" alt="Facebook">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/apple.svg" alt="Apple">
      </div>
    </section>

    <section class="signin-image">
      <img src="https://images.unsplash.com/photo-1599058917212-d750089bc07f?auto=format&fit=crop&w=1000&q=80" alt="Fitness">
    </section>
  </main>

  <footer class="tagline">
    You Don’t Need A New Life, Just New Habits.
  </footer>
  <script>
  // Select all toggle icons
  document.querySelectorAll('.toggle').forEach(toggle => {
    toggle.addEventListener('click', () => {
      const input = toggle.previousElementSibling; // the input next to the eye icon
      if (input.type === 'password') {
        input.type = 'text';
        toggle.textContent = '🙈'; // change icon when visible
      } else {
        input.type = 'password';
        toggle.textContent = '👁️'; // revert icon
      }
    });
  });
</script>
<form action="/signin" method="POST">

</body>
</html>
